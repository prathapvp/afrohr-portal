# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/afrohr}
spring.datasource.username=${DATABASE_USERNAME:afrohr}
spring.datasource.password=${DATABASE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:changeme-use-a-256-bit-secret-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── File Upload (resume parsing) ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
