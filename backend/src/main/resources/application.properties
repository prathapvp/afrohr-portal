spring.application.name=AfroHR
server.port=8080
# Load local developer overrides (gitignored) — safe to be absent in prod
spring.config.import=optional:classpath:application-local.properties

# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:afrohr}
spring.datasource.username=${DB_USER:afrohr}
spring.datasource.password=${DB_PASSWORD:afrohr_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── SQL Init (search_content seed table) ───────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=afro-hr-portal-super-secure-jwt-secret-key-for-hs256-algorithm-authentication-purpose-minimum-256-bits
jwt.expiration=86400000

# ── PII Encryption ─────────────────────────────────────────
app.pii.secret=${PII_SECRET:change-me-pii-secret}

# ── Email ───────────────────────────────────────────────────
 spring.mail.host=smtpout.secureserver.net
 spring.mail.port=587
 spring.mail.username=${EMAIL_USERNAME:info@afrohr.in}
 spring.mail.password=${EMAIL_PASSWORD:Afro@1996#}
 spring.mail.properties.mail.smtp.auth=true
 spring.mail.properties.mail.smtp.starttls.enable=true


#spring.mail.host=smtpout.secureserver.net
#spring.mail.port=465
#spring.mail.username=${EMAIL_USERNAME:testafro5@gmail.com}
#spring.mail.password=${EMAIL_PASSWORD:April@2026}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.ssl.enable=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# ── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── OpenAI / Profile Assistant ──────────────────────────────
openai.api.key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-tokens=${OPENAI_MAX_TOKENS:350}
student.recommendation.provider=${STUDENT_RECOMMENDATION_PROVIDER:local}
student.recommendation.openai.max-tokens=${STUDENT_RECOMMENDATION_OPENAI_MAX_TOKENS:450}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434/api/generate}
ollama.model=${OLLAMA_MODEL:llama3.2}
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${SPRING_AI_OLLAMA_MODEL:${OLLAMA_MODEL:llama3.2}}
student.chatbot.ollama.temperature=${STUDENT_CHATBOT_OLLAMA_TEMPERATURE:0.4}
student.chatbot.ollama.max-tokens=${STUDENT_CHATBOT_OLLAMA_MAX_TOKENS:350}
student.chatbot.max-response-words=${STUDENT_CHATBOT_MAX_RESPONSE_WORDS:100}

# ── OpenAPI / Swagger ───────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Error handling ──────────────────────────────────────────
spring.web.resources.add-mappings=false
