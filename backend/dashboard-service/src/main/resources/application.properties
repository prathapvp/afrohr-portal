spring.application.name=AfroHR
server.port=8080
# Load local developer overrides (gitignored) — safe to be absent in prod
spring.config.import=optional:classpath:application-local.properties


# ── PostgreSQL ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:afrohr}
spring.datasource.username=${DB_USER:afrohr}
spring.datasource.password=${DB_PASSWORD:afrohr_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── SQL Init (search_content seed table) ───────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=afro-hr-portal-super-secure-jwt-secret-key-for-hs256-algorithm-authentication-purpose-minimum-256-bits
jwt.expiration=86400000

# ── PII Encryption ─────────────────────────────────────────
app.pii.secret=${PII_SECRET:change-me-pii-secret}

# ── Email ───────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=testafro5@gmail.com
spring.mail.password=winm afxs qtoy bnef
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── OpenAI / Profile Assistant ──────────────────────────────
openai.api.key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-tokens=${OPENAI_MAX_TOKENS:350}

# ── OpenAPI / Swagger ───────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Error handling ──────────────────────────────────────────
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ── Exception Messages ──────────────────────────────────────
USER_FOUND=Email registered already.
USER_NOT_FOUND=User is not registered.
INVALID_CREDENTIALS=Invalid Credentials.
PROFILE_NOT_FOUND=Profile not found.
OTP_NOT_FOUND=OTP has been expired.
OTP_INCORRECT=OTP is incorrect.
JOB_NOT_FOUND=Job not found.
JOB_APPLIED_ALREADY=Already Applied to this Job.
APPLICANT_NOT_FOUND=Applicant not found.
